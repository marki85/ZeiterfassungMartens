<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Werkzeit — Martens</title>
<style>
:root {
  color-scheme: light only;
  --bg:#EEF1EC; --surface:#FFFFFF; --surface2:#F6F8F4;
  --ink:#141C17; --ink2:#4E5852; --ink3:#8A938C;
  --brand:#204632; --onbrand:#EFF4EC;
  --accent:#B8722A; --onaccent:#FFFFFF;
  --danger:#A5392C; --border:#E1E5DF; --borderStrong:#C6CCC4;
}
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html,body{margin:0;padding:0;background:var(--bg);}
.wz{
  background:var(--bg); color:var(--ink); min-height:100vh; padding-bottom:88px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.num{font-variant-numeric:tabular-nums;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;}
.header{background:var(--brand);color:var(--onbrand);padding:22px 20px 18px;}
.header-in{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.logo{width:42px;height:42px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.title{font-weight:700;font-size:18px;letter-spacing:-0.02em;line-height:1;margin:0;}
.sub{font-size:12px;color:#B9C6B7;margin:5px 0 0;}
.main{max-width:560px;margin:0 auto;padding:18px 16px 0;}
.h2{font-weight:650;font-size:19px;color:var(--brand);margin:0;letter-spacing:-0.01em;}
.row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.fab{background:var(--accent);color:var(--onaccent);border:none;border-radius:999px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(31,59,44,.22);cursor:pointer;font-size:22px;line-height:1;}
.fab:active{transform:scale(.94);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.item{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.month{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin:0 0 8px 2px;}
.name{font-weight:600;font-size:14px;color:var(--ink);margin:0;}
.desc{font-size:12.5px;color:var(--ink2);margin:2px 0 0;white-space:pre-line;}
.meta{font-size:12px;color:var(--ink3);margin:5px 0 0;}
.hours{font-weight:650;font-size:14px;color:var(--brand);margin:0;}
.hours-helper{font-size:12px;color:var(--accent);margin:2px 0 0;font-weight:600;}
.badge{display:inline-block;font-size:10px;font-weight:600;background:#DDE7D8;color:var(--brand);padding:2px 7px;border-radius:999px;vertical-align:middle;margin-left:6px;}
.del{color:var(--danger);background:none;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;margin-left:auto;padding:2px 0;}
.empty{text-align:center;padding:38px 20px;background:var(--surface2);border:1px dashed var(--borderStrong);border-radius:14px;}
.empty-title{font-weight:600;color:var(--brand);margin:8px 0 0;}
.empty-text{font-size:13.5px;color:var(--ink2);margin:5px 0 0;}
.btn{width:100%;border:none;border-radius:12px;font-weight:650;font-size:15px;padding:13px;cursor:pointer;}
.btn:active{transform:scale(.99);}
.btn-primary{background:var(--brand);color:var(--onbrand);}
.btn-accent{background:var(--accent);color:var(--onaccent);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{width:100%;background:none;border:1.5px solid var(--brand);color:var(--brand);border-radius:12px;font-weight:600;font-size:14px;padding:11px;cursor:pointer;}
.label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px;}
.field{margin-bottom:16px;}
.input{width:100%;background:var(--surface,#fff);border:1px solid var(--borderStrong);border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink,#141C17);outline:none;font-family:inherit;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,122,34,.18);}
textarea.input{min-height:74px;resize:vertical;}
.suffix{position:relative;}
.suffix span{position:absolute;right:12px;top:11px;font-size:13px;color:var(--ink3);}
.suffix .input{padding-right:42px;}
.seg{display:flex;gap:8px;margin-bottom:16px;}
.seg button{flex:1;padding:9px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--borderStrong);background:var(--surface);color:var(--ink2);}
.seg button.on{background:var(--brand);color:var(--onbrand);border-color:var(--brand);}
.check{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--brand);cursor:pointer;margin-bottom:14px;}
.check input{width:18px;height:18px;accent-color:var(--accent);}
.helper-box{border-left:3px solid var(--accent);padding-left:12px;margin:0 0 14px 2px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--brand);border-top:1px solid #16281E;z-index:40;}
.nav-in{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 13px;font-size:11px;font-weight:600;background:none;border:none;color:#8FA089;cursor:pointer;}
.nav button.on{color:var(--accent);}
.nav svg{width:20px;height:20px;}
.sheet-bg{position:fixed;inset:0;z-index:50;background:rgba(12,20,15,.62);display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg,#EEF1EC);width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;padding:20px 18px 30px;box-shadow:0 -8px 30px rgba(0,0,0,.25);}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sheet-head h3{margin:0;font-weight:650;font-size:18px;color:var(--brand);}
.x{background:none;border:none;color:var(--ink2);cursor:pointer;font-size:20px;line-height:1;padding:4px;}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--brand);color:var(--onbrand);padding:10px 18px;border-radius:999px;font-size:13.5px;z-index:60;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.warn{font-size:13.5px;color:var(--danger);margin:0;}
.hint{font-size:14px;color:var(--ink2);margin:8px 0;}
.selrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px;}
.selrow input{width:18px;height:18px;accent-color:var(--accent);}
.total{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px;margin-top:14px;}
.inv-card{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:8px;}
.tip{font-size:12.5px;color:var(--ink2);line-height:1.55;padding-top:16px;margin-top:16px;border-top:1px solid var(--border);}
.invbar{max-width:560px;margin:0 auto;padding:22px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.back{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--brand);font-weight:600;font-size:14px;cursor:pointer;}
.print{display:flex;align-items:center;gap:8px;background:var(--brand);color:var(--onbrand);border:none;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;}
.paper{max-width:560px;margin:6px auto;background:#fff;color:#1a1a1a;padding:34px;box-shadow:0 1px 8px rgba(0,0,0,.08);}
.paper h4{margin:0;font-size:17px;}
.paper table{width:100%;border-collapse:collapse;font-size:13.5px;margin:22px 0 10px;}
.paper th{text-align:left;border-bottom:2px solid #1a1a1a;padding:7px 4px;font-size:12px;}
.paper td{padding:6px 4px;border-bottom:1px solid #eee;}
.r{text-align:right;}
@media print{
  body *{visibility:hidden;}
  #print,#print *{visibility:visible;}
  #print{position:absolute;top:0;left:0;width:100%;box-shadow:none;margin:0;}
  .noprint{display:none !important;}
}
</style>
</head>
<body>
<div class="wz" id="app"></div>
<script>
"use strict";
/* ---------- Daten ---------- */
var KEY = "werkzeit-v3";
function defaults(){ return {
  settings:{ firma:"Martens Garten- & Handwerksservice", inhaber:"Johannes Martens",
    adresse:"", steuernummer:"", iban:"", sohnName:"Sohn",
    rateOwn:35, rateHelper:15, nextInvoiceNo:1, invoicePrefix:String(new Date().getFullYear()) },
  customers:[], entries:[], invoices:[] }; }
var state = load();
var tab = "zeit";
var invoiceView = null;     // Rechnungsobjekt oder null
var modal = null;           // {kind, ...}
function load(){
  try{ var v=localStorage.getItem(KEY); if(v){ var p=JSON.parse(v);
    var d=defaults(); d.settings=Object.assign(d.settings,p.settings||{});
    d.customers=p.customers||[]; d.entries=p.entries||[]; d.invoices=p.invoices||[]; return d; } }
  catch(e){}
  return defaults();
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ toast("Speichern fehlgeschlagen"); } }

/* ---------- Helfer ---------- */
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function eur(n){ return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n||0); }
function fmtDate(iso){ if(!iso) return ""; var a=iso.split("-"); return a[2]+"."+a[1]+"."+a[0]; }
function hoursBetween(s,e){ if(!s||!e) return 0; var a=s.split(":").map(Number), b=e.split(":").map(Number);
  var m=b[0]*60+b[1]-(a[0]*60+a[1]); if(m<0)m+=1440; return Math.round(m/60*100)/100; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function custName(id){ var c=state.customers.filter(function(c){return c.id===id;})[0]; return c?c.name:"(kein Kunde)"; }
function lineSum(e){ return e.hoursOwn*e.rateOwn + e.hoursHelper*e.rateHelper; }
var toastTimer=null;
function toast(msg){ var t=document.getElementById("toast"); if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t);} t.textContent=msg; clearTimeout(toastTimer); toastTimer=setTimeout(function(){ if(t)t.remove(); },2200); }

/* ---------- Icons ---------- */
var ICON={
  zeit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  kunden:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  rechnungen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
  einstellungen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  hammer:'<svg viewBox="0 0 24 24" fill="none" stroke="#1F3B2C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="21" height="21"><path d="M15 12l-8.5 8.5a2.12 2.12 0 1 1-3-3L12 9"/><path d="M17.64 15 22 10.64"/><path d="M20.91 11.7l-1.25-1.25c-.6-.6-.93-1.4-.93-2.25v-.86L16.01 4.6a5.56 5.56 0 0 0-3.94-1.64H9l.92.82A6.18 6.18 0 0 1 12 8.4v1.56l2 2h2.47l2.26 1.91"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="vertical-align:-2px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
};

/* ---------- Render ---------- */
var app = document.getElementById("app");
function render(){
  if(invoiceView){ renderInvoice(); return; }
  var h = '';
  h += '<header class="header"><div class="header-in"><div class="logo">'+ICON.hammer+'</div>'
     + '<div><p class="title">'+esc(state.settings.firma||"Werkzeit")+'</p>'
     + '<p class="sub">Zeiterfassung &amp; Rechnungen</p></div></div></header>';
  h += '<main class="main">';
  if(tab==="zeit") h+=viewZeit();
  else if(tab==="kunden") h+=viewKunden();
  else if(tab==="rechnungen") h+=viewRechnungen();
  else h+=viewEinstellungen();
  h += '</main>';
  var navs=[["zeit","Zeit"],["kunden","Kunden"],["rechnungen","Rechnungen"],["einstellungen","Mehr"]];
  h += '<nav class="nav noprint"><div class="nav-in">';
  navs.forEach(function(n){ h+='<button data-act="tab" data-v="'+n[0]+'" class="'+(tab===n[0]?"on":"")+'">'+ICON[n[0]]+'<span>'+n[1]+'</span></button>'; });
  h += '</div></nav>';
  app.innerHTML = h;
  if(modal) renderModal();
}

function viewZeit(){
  var h='<div class="row-head"><h2 class="h2">Arbeitszeiten</h2><button class="fab" data-act="newEntry">+</button></div>';
  if(state.entries.length===0) return h+empty("kunden","Noch keine Zeit erfasst","Trag deinen ersten Arbeitseinsatz ein — Datum, Kunde, Dauer.");
  var sorted=state.entries.slice().sort(function(a,b){return a.date<b.date?1:-1;});
  var groups={}; sorted.forEach(function(e){ var k=e.date.slice(0,7); (groups[k]=groups[k]||[]).push(e); });
  Object.keys(groups).forEach(function(m){
    var d=new Date(m+"-01");
    h+='<div style="margin-bottom:20px"><p class="month">'+d.toLocaleDateString("de-DE",{month:"long",year:"numeric"})+'</p><div class="card">';
    groups[m].forEach(function(e){
      h+='<div class="item"><button style="text-align:left;flex:1;background:none;border:none;padding:0;cursor:pointer" data-act="editEntry" data-id="'+e.id+'">'
        +'<p class="name">'+esc(custName(e.customerId))+(e.invoiceId?'<span class="badge">abgerechnet</span>':'')+'</p>'
        +'<p class="desc">'+esc(e.description||"—")+'</p><p class="meta">'+fmtDate(e.date)+'</p></button>'
        +'<div style="text-align:right;margin-left:8px;flex-shrink:0"><p class="hours num">'+e.hoursOwn.toFixed(2)+' h</p>'
        +(e.hoursHelper>0?'<p class="hours-helper num">+'+e.hoursHelper.toFixed(2)+' h ('+esc(state.settings.sohnName)+')</p>':'')
        +(!e.invoiceId?'<button class="del" data-act="delEntry" data-id="'+e.id+'">'+ICON.trash+' löschen</button>':'')
        +'</div></div>';
    });
    h+='</div></div>';
  });
  return h;
}
function viewKunden(){
  var h='<div class="row-head"><h2 class="h2">Kunden</h2><button class="fab" data-act="newCustomer">+</button></div>';
  if(state.customers.length===0) return h+empty("kunden","Noch keine Kunden","Leg deinen ersten Kunden an, um Zeiten zuzuordnen.");
  state.customers.forEach(function(c){
    h+='<div class="card" style="padding:13px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      +'<button style="text-align:left;background:none;border:none;padding:0;cursor:pointer" data-act="editCustomer" data-id="'+c.id+'">'
      +'<p class="name">'+esc(c.name)+'</p><p class="desc">'+esc(c.address)+'</p></button>'
      +'<button class="del" style="margin-left:8px" data-act="delCustomer" data-id="'+c.id+'">'+ICON.trash+'</button></div>';
  });
  return h;
}
function viewRechnungen(){
  var h='<div class="row-head"><h2 class="h2">Rechnungen</h2><button class="fab" data-act="newInvoice">+</button></div>';
  h+='<div style="margin-bottom:16px"><button class="btn-ghost" data-act="exportCsv">Alle Zeiten als CSV exportieren</button></div>';
  if(state.invoices.length===0) h+=empty("rechnungen","Noch keine Rechnung","Wähle Kunde und Einträge, um eine Rechnung zu erstellen.");
  state.invoices.slice().reverse().forEach(function(inv){
    h+='<button class="inv-card" data-act="openInvoice" data-id="'+inv.id+'"><div><p class="name">'+esc(custName(inv.customerId))+'</p>'
      +'<p class="meta num">Rechnung '+inv.number+' · '+fmtDate(inv.createdAt)+'</p></div>'
      +'<p class="hours num" style="font-size:15px">'+eur(inv.total)+'</p></button>';
  });
  return h;
}
function viewEinstellungen(){
  var s=state.settings;
  function f(label,id,val,type,suffix){ type=type||"text";
    var inp='<input class="input" id="'+id+'" type="'+type+'" value="'+esc(val)+'">';
    if(suffix) inp='<div class="suffix">'+inp+'<span>'+suffix+'</span></div>';
    return '<div class="field"><label class="label">'+label+'</label>'+inp+'</div>'; }
  var h='<h2 class="h2" style="margin-bottom:14px">Einstellungen</h2>';
  h+=f("Firmenname (auf Rechnung)","set_firma",s.firma);
  h+=f("Name (Inhaber)","set_inhaber",s.inhaber);
  h+='<div class="field"><label class="label">Adresse</label><textarea class="input" id="set_adresse">'+esc(s.adresse)+'</textarea></div>';
  h+=f("Steuernummer","set_steuernummer",s.steuernummer);
  h+=f("IBAN","set_iban",s.iban);
  h+='<div class="grid2">'+f("Dein Stundenlohn","set_rateOwn",s.rateOwn,"number","€/h")+f("Lohn Helfer","set_rateHelper",s.rateHelper,"number","€/h")+'</div>';
  h+=f("Name des Helfers","set_sohnName",s.sohnName);
  h+='<div class="grid2">'+f("Rechnungspräfix","set_invoicePrefix",s.invoicePrefix)+f("Nächste Nr.","set_nextInvoiceNo",s.nextInvoiceNo,"number")+'</div>';
  h+='<button class="btn btn-primary" data-act="saveSettings">Speichern</button>';
  h+='<p class="tip">Tipp fürs iPhone: über „Teilen" → „Zum Home-Bildschirm" bekommst du ein eigenes App-Symbol — ganz ohne App Store oder Entwickler-Account.</p>';
  return h;
}
function empty(icon,title,text){
  return '<div class="empty" style="color:#9AA396">'+ICON[icon]
    .replace('<svg','<svg width="28" height="28" style="margin:0 auto"')
    +'<p class="empty-title">'+title+'</p><p class="empty-text">'+text+'</p></div>';
}

/* ---------- Modals ---------- */
function renderModal(){
  var old=document.getElementById("sheet-bg"); if(old) old.remove();
  var bg=document.createElement("div"); bg.className="sheet-bg"; bg.id="sheet-bg";
  var inner="";
  if(modal.kind==="entry") inner=entryForm();
  else if(modal.kind==="customer") inner=customerForm();
  else if(modal.kind==="invoice") inner=invoiceForm();
  bg.innerHTML='<div class="sheet" id="sheet"><div class="sheet-head"><h3>'+modal.title+'</h3><button class="x" data-act="closeModal">&times;</button></div>'+inner+'</div>';
  document.body.appendChild(bg);
  bg.addEventListener("click",function(ev){ if(ev.target===bg) closeModal(); });
  if(modal.kind==="entry") wireEntryForm();
}
function closeModal(){ modal=null; var b=document.getElementById("sheet-bg"); if(b)b.remove(); }

function entryForm(){
  var m=modal, cs=state.customers;
  var custOpts = cs.map(function(c){ return '<option value="'+c.id+'"'+(c.id===m.customerId?" selected":"")+'>'+esc(c.name)+'</option>'; }).join("");
  var h="";
  h+='<div class="field"><label class="label">Datum</label><input class="input" type="date" id="e_date" value="'+m.date+'"></div>';
  h+='<div class="field"><label class="label">Kunde</label>'+(cs.length===0?'<p class="warn">Erst einen Kunden anlegen (Tab „Kunden").</p>':'<select class="input" id="e_cust">'+custOpts+'</select>')+'</div>';
  h+='<div class="field"><label class="label">Tätigkeit</label><input class="input" id="e_desc" value="'+esc(m.description)+'" placeholder="z.B. Hecke schneiden, Terrasse pflastern…"></div>';
  h+='<div class="seg"><button type="button" id="e_segTime" class="'+(!m.manual?"on":"")+'">Start / Ende</button><button type="button" id="e_segMan" class="'+(m.manual?"on":"")+'">Stunden direkt</button></div>';
  h+='<div id="e_timewrap">'+timeInputs()+'</div>';
  h+='<p class="hint">Ergibt <b class="num" id="e_hint">'+computedHours().toFixed(2)+' h</b></p>';
  h+='<div class="field"><label class="label">Stundenlohn (du)</label><div class="suffix"><input class="input" type="number" step="0.5" id="e_rate" value="'+m.rateOwn+'"><span>€/h</span></div></div>';
  h+='<label class="check"><input type="checkbox" id="e_helper"'+(m.helperOn?" checked":"")+'> '+esc(state.settings.sohnName)+' hat mitgeholfen</label>';
  h+='<div id="e_helperwrap">'+(m.helperOn?helperInputs():"")+'</div>';
  h+='<button class="btn btn-accent" id="e_save"'+(cs.length===0?" disabled":"")+'>Speichern</button>';
  return h;
}
function timeInputs(){ var m=modal;
  if(m.manual) return '<div class="field"><label class="label">Stunden</label><input class="input" type="number" step="0.25" min="0" id="e_hours" value="'+m.manualHours+'"></div>';
  return '<div class="grid2"><div class="field"><label class="label">Start</label><input class="input" type="time" id="e_start" value="'+m.start+'"></div><div class="field"><label class="label">Ende</label><input class="input" type="time" id="e_end" value="'+m.end+'"></div></div>';
}
function helperInputs(){ var m=modal;
  return '<div class="helper-box"><div class="field"><label class="label">Stunden ('+esc(state.settings.sohnName)+')</label><input class="input" type="number" step="0.25" min="0" id="e_hhours" value="'+m.hoursHelper+'"></div><div class="field"><label class="label">Stundenlohn</label><div class="suffix"><input class="input" type="number" step="0.5" id="e_hrate" value="'+m.rateHelper+'"><span>€/h</span></div></div></div>';
}
function computedHours(){ var m=modal; return m.manual ? (parseFloat(m.manualHours)||0) : hoursBetween(m.start,m.end); }
function syncEntryFromInputs(){ var m=modal;
  var g=function(id){ return document.getElementById(id); };
  if(g("e_date")) m.date=g("e_date").value;
  if(g("e_cust")) m.customerId=g("e_cust").value;
  if(g("e_desc")) m.description=g("e_desc").value;
  if(g("e_rate")) m.rateOwn=g("e_rate").value;
  if(m.manual){ if(g("e_hours")) m.manualHours=g("e_hours").value; }
  else { if(g("e_start")) m.start=g("e_start").value; if(g("e_end")) m.end=g("e_end").value; }
  if(m.helperOn){ if(g("e_hhours")) m.hoursHelper=g("e_hhours").value; if(g("e_hrate")) m.rateHelper=g("e_hrate").value; }
}
function updateHint(){ var el=document.getElementById("e_hint"); if(el) el.textContent=computedHours().toFixed(2)+" h"; }
function wireEntryForm(){
  var g=function(id){ return document.getElementById(id); };
  ["e_start","e_end","e_hours"].forEach(function(id){ var el=g(id); if(el) el.addEventListener("input",function(){ syncEntryFromInputs(); updateHint(); }); });
  if(g("e_segTime")) g("e_segTime").addEventListener("click",function(){ syncEntryFromInputs(); modal.manual=false; g("e_segTime").className="on"; g("e_segMan").className=""; g("e_timewrap").innerHTML=timeInputs(); wireEntryForm(); updateHint(); });
  if(g("e_segMan")) g("e_segMan").addEventListener("click",function(){ syncEntryFromInputs(); modal.manual=true; g("e_segMan").className="on"; g("e_segTime").className=""; g("e_timewrap").innerHTML=timeInputs(); wireEntryForm(); updateHint(); });
  if(g("e_helper")) g("e_helper").addEventListener("change",function(){ syncEntryFromInputs(); modal.helperOn=g("e_helper").checked; g("e_helperwrap").innerHTML=modal.helperOn?helperInputs():""; wireEntryForm(); });
  if(g("e_save")) g("e_save").addEventListener("click",saveEntry);
}
function saveEntry(){
  syncEntryFromInputs(); var m=modal;
  if(!m.customerId){ toast("Bitte Kunde wählen"); return; }
  var entry={ id:m.id||uid(), date:m.date, customerId:m.customerId, description:m.description,
    start:m.manual?null:m.start, end:m.manual?null:m.end, manual:!!m.manual,
    hoursOwn:computedHours(), rateOwn:parseFloat(m.rateOwn)||0,
    hoursHelper:m.helperOn?(parseFloat(m.hoursHelper)||0):0, rateHelper:parseFloat(m.rateHelper)||0,
    invoiceId:m.invoiceId||null };
  var exists=state.entries.some(function(e){return e.id===entry.id;});
  if(exists) state.entries=state.entries.map(function(e){return e.id===entry.id?entry:e;});
  else state.entries.push(entry);
  save(); closeModal(); render(); toast(exists?"Aktualisiert":"Gespeichert");
}

function customerForm(){ var m=modal;
  return '<div class="field"><label class="label">Name</label><input class="input" id="c_name" value="'+esc(m.name)+'" placeholder="Familie Müller"></div>'
    +'<div class="field"><label class="label">Adresse</label><textarea class="input" id="c_addr" placeholder="Musterstraße 1&#10;12345 Musterstadt">'+esc(m.address)+'</textarea></div>'
    +'<button class="btn btn-accent" data-act="saveCustomer">Speichern</button>';
}
function saveCustomer(){
  var name=document.getElementById("c_name").value.trim();
  var addr=document.getElementById("c_addr").value;
  if(!name){ toast("Name fehlt"); return; }
  var c={ id:modal.id||uid(), name:name, address:addr };
  var exists=state.customers.some(function(x){return x.id===c.id;});
  if(exists) state.customers=state.customers.map(function(x){return x.id===c.id?c:x;});
  else state.customers.push(c);
  save(); closeModal(); render(); toast("Gespeichert");
}

function invoiceForm(){
  var m=modal, cs=state.customers;
  if(cs.length===0) return '<p class="warn">Erst Kunden anlegen.</p>';
  var custOpts=cs.map(function(c){return '<option value="'+c.id+'"'+(c.id===m.customerId?" selected":"")+'>'+esc(c.name)+'</option>';}).join("");
  var open=state.entries.filter(function(e){return e.customerId===m.customerId && !e.invoiceId;});
  var h='<div class="field"><label class="label">Kunde</label><select class="input" id="i_cust">'+custOpts+'</select></div>';
  if(open.length===0){ h+='<p class="warn">Keine offenen Einträge für diesen Kunden.</p>'; }
  else{
    h+='<p class="month">Offene Einträge</p>';
    open.forEach(function(e){
      var checked = m.sel[e.id]!==false;
      h+='<label class="selrow"><input type="checkbox" data-sel="'+e.id+'"'+(checked?" checked":"")+'>'
        +'<div style="flex:1"><p class="name">'+fmtDate(e.date)+' — '+esc(e.description||"Arbeitszeit")+'</p>'
        +'<p class="meta num">'+e.hoursOwn.toFixed(2)+' h'+(e.hoursHelper>0?" + "+e.hoursHelper.toFixed(2)+" h Helfer":"")+'</p></div>'
        +'<p class="num" style="font-size:13.5px">'+eur(lineSum(e))+'</p></label>';
    });
  }
  var total=open.reduce(function(s,e){ return s + (m.sel[e.id]!==false ? lineSum(e):0); },0);
  h+='<div class="total"><span style="font-weight:650">Gesamt</span><span class="num" id="i_total" style="font-weight:700;font-size:18px;color:#1F3B2C">'+eur(total)+'</span></div>';
  h+='<div style="margin-top:14px"><button class="btn btn-accent" data-act="createInvoice"'+(open.length===0?" disabled":"")+'>Rechnung erstellen</button></div>';
  return h;
}
function recalcInvoiceTotal(){
  var m=modal; var open=state.entries.filter(function(e){return e.customerId===m.customerId && !e.invoiceId;});
  var total=open.reduce(function(s,e){ return s + (m.sel[e.id]!==false ? lineSum(e):0); },0);
  var el=document.getElementById("i_total"); if(el) el.textContent=eur(total);
}
function createInvoice(){
  var m=modal; var open=state.entries.filter(function(e){return e.customerId===m.customerId && !e.invoiceId;});
  var chosen=open.filter(function(e){ return m.sel[e.id]!==false; });
  if(chosen.length===0){ toast("Keine Einträge gewählt"); return; }
  var number=state.settings.invoicePrefix+"-"+String(state.settings.nextInvoiceNo).padStart(3,"0");
  var total=chosen.reduce(function(s,e){return s+lineSum(e);},0);
  var inv={ id:uid(), number:number, customerId:m.customerId, createdAt:todayISO(),
    lines:chosen.map(function(e){ return {date:e.date,description:e.description,hoursOwn:e.hoursOwn,rateOwn:e.rateOwn,hoursHelper:e.hoursHelper,rateHelper:e.rateHelper}; }),
    total:total };
  var chosenIds={}; chosen.forEach(function(e){chosenIds[e.id]=1;});
  state.entries=state.entries.map(function(e){ return chosenIds[e.id]?Object.assign({},e,{invoiceId:inv.id}):e; });
  state.invoices.push(inv); state.settings.nextInvoiceNo++;
  save(); closeModal(); invoiceView=inv; render();
}

/* ---------- Rechnungsansicht ---------- */
function renderInvoice(){
  var inv=invoiceView, s=state.settings, c=state.customers.filter(function(x){return x.id===inv.customerId;})[0];
  var rows="";
  inv.lines.forEach(function(l){
    rows+='<tr><td>'+fmtDate(l.date)+'</td><td>'+esc(l.description||"Arbeitszeit")+'</td><td class="r num">'+l.hoursOwn.toFixed(2)+'</td><td class="r num">'+eur(l.rateOwn)+'</td><td class="r num">'+eur(l.hoursOwn*l.rateOwn)+'</td></tr>';
    if(l.hoursHelper>0) rows+='<tr style="color:#666"><td></td><td style="font-style:italic">davon Helfer ('+esc(s.sohnName)+')</td><td class="r num">'+l.hoursHelper.toFixed(2)+'</td><td class="r num">'+eur(l.rateHelper)+'</td><td class="r num">'+eur(l.hoursHelper*l.rateHelper)+'</td></tr>';
  });
  var h='<div class="invbar noprint"><button class="back" data-act="closeInvoice">&#8249; Zurück</button><button class="print" data-act="printInvoice">Als PDF speichern</button></div>';
  h+='<div id="print" class="paper">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px"><div><h4>'+esc(s.firma||s.inhaber)+'</h4><p style="margin:4px 0 0;font-size:13px;white-space:pre-line;color:#444">'+esc(s.adresse)+'</p></div>'
    +'<div style="text-align:right;font-size:13px"><p class="num" style="margin:0;font-weight:700;font-size:15px">Rechnung '+inv.number+'</p><p style="margin:3px 0 0;color:#444">Datum: '+fmtDate(inv.createdAt)+'</p></div></div>';
  h+='<div style="margin-bottom:22px"><p style="font-size:11px;text-transform:uppercase;color:#888;margin:0 0 3px">Rechnung an</p><p style="margin:0;font-weight:600">'+esc(c?c.name:"")+'</p><p style="margin:2px 0 0;font-size:13px;white-space:pre-line;color:#444">'+esc(c?c.address:"")+'</p></div>';
  h+='<table><thead><tr><th>Datum</th><th>Leistung</th><th class="r">Std.</th><th class="r">Satz</th><th class="r">Betrag</th></tr></thead><tbody>'+rows+'</tbody></table>';
  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:26px"><div style="width:220px"><div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px;border-top:2px solid #1a1a1a;padding-top:8px"><span>Gesamtbetrag</span><span class="num">'+eur(inv.total)+'</span></div></div></div>';
  h+='<p style="font-size:12px;color:#666;margin-bottom:22px">Gemäß § 19 UStG wird keine Umsatzsteuer berechnet und ausgewiesen (Kleinunternehmerregelung).</p>';
  h+='<div style="font-size:12px;color:#666;border-top:1px solid #eee;padding-top:14px;line-height:1.6">'
    +(s.steuernummer?'<p style="margin:0">Steuernummer: '+esc(s.steuernummer)+'</p>':'')
    +(s.iban?'<p style="margin:0">IBAN: '+esc(s.iban)+'</p>':'')
    +(s.inhaber?'<p style="margin:0">'+esc(s.inhaber)+'</p>':'')+'</div>';
  h+='</div>';
  app.innerHTML=h;
}

/* ---------- CSV Export ---------- */
function exportCsv(){
  if(state.entries.length===0){ toast("Keine Daten zum Export"); return; }
  var sep=";";
  var head=["Datum","Kunde","Tätigkeit","Stunden (du)","Satz du","Stunden ("+state.settings.sohnName+")","Satz Helfer","Summe","Abgerechnet"];
  var lines=[head.join(sep)];
  state.entries.forEach(function(e){
    var row=[fmtDate(e.date), custName(e.customerId), (e.description||""),
      String(e.hoursOwn).replace(".",","), String(e.rateOwn).replace(".",","),
      String(e.hoursHelper).replace(".",","), String(e.rateHelper).replace(".",","),
      lineSum(e).toFixed(2).replace(".",","), e.invoiceId?"ja":"nein"];
    row=row.map(function(v){ v=String(v); return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; });
    lines.push(row.join(sep));
  });
  var csv=lines.join("\r\n");
  var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download="zeiterfassung_"+todayISO()+".csv";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  toast("CSV wird heruntergeladen…");
}

/* ---------- Events ---------- */
document.addEventListener("click",function(ev){
  var t=ev.target.closest("[data-act]"); if(!t) return;
  var act=t.getAttribute("data-act"), id=t.getAttribute("data-id");
  if(act==="tab"){ tab=t.getAttribute("data-v"); render(); }
  else if(act==="newEntry"){ modal={kind:"entry",title:"Neuer Eintrag",id:null,date:todayISO(),customerId:(state.customers[0]||{}).id||"",description:"",start:"08:00",end:"12:00",manual:false,manualHours:hoursBetween("08:00","12:00"),rateOwn:state.settings.rateOwn,helperOn:false,hoursHelper:hoursBetween("08:00","12:00"),rateHelper:state.settings.rateHelper,invoiceId:null}; renderModal(); }
  else if(act==="editEntry"){ var e=state.entries.filter(function(x){return x.id===id;})[0]; if(e.invoiceId){ toast("Abgerechnet – nicht bearbeitbar"); return; } modal={kind:"entry",title:"Eintrag bearbeiten",id:e.id,date:e.date,customerId:e.customerId,description:e.description,start:e.start||"08:00",end:e.end||"12:00",manual:!!e.manual,manualHours:e.hoursOwn,rateOwn:e.rateOwn,helperOn:e.hoursHelper>0,hoursHelper:e.hoursHelper,rateHelper:e.rateHelper,invoiceId:e.invoiceId}; renderModal(); }
  else if(act==="delEntry"){ var d=state.entries.filter(function(x){return x.id===id;})[0]; if(d&&d.invoiceId){ toast("Abgerechnet – nicht löschbar"); return; } state.entries=state.entries.filter(function(x){return x.id!==id;}); save(); render(); toast("Gelöscht"); }
  else if(act==="newCustomer"){ modal={kind:"customer",title:"Neuer Kunde",id:null,name:"",address:""}; renderModal(); }
  else if(act==="editCustomer"){ var c=state.customers.filter(function(x){return x.id===id;})[0]; modal={kind:"customer",title:"Kunde bearbeiten",id:c.id,name:c.name,address:c.address}; renderModal(); }
  else if(act==="delCustomer"){ if(state.entries.some(function(e){return e.customerId===id;})){ toast("Kunde hat Einträge – nicht löschbar"); return; } state.customers=state.customers.filter(function(x){return x.id!==id;}); save(); render(); }
  else if(act==="saveCustomer"){ saveCustomer(); }
  else if(act==="newInvoice"){ modal={kind:"invoice",title:"Neue Rechnung",customerId:(state.customers[0]||{}).id||"",sel:{}}; renderModal(); }
  else if(act==="createInvoice"){ createInvoice(); }
  else if(act==="openInvoice"){ invoiceView=state.invoices.filter(function(x){return x.id===id;})[0]; render(); }
  else if(act==="closeInvoice"){ invoiceView=null; render(); }
  else if(act==="printInvoice"){ window.print(); }
  else if(act==="exportCsv"){ exportCsv(); }
  else if(act==="saveSettings"){ saveSettings(); }
  else if(act==="closeModal"){ closeModal(); }
});
document.addEventListener("change",function(ev){
  var cb=ev.target.closest("[data-sel]"); if(cb && modal && modal.kind==="invoice"){ modal.sel[cb.getAttribute("data-sel")]=cb.checked; recalcInvoiceTotal(); }
  var ic=ev.target.closest("#i_cust"); if(ic && modal && modal.kind==="invoice"){ modal.customerId=ic.value; modal.sel={}; renderModal(); }
});
function saveSettings(){
  var g=function(id){ return document.getElementById(id).value; };
  var s=state.settings;
  s.firma=g("set_firma"); s.inhaber=g("set_inhaber"); s.adresse=g("set_adresse");
  s.steuernummer=g("set_steuernummer"); s.iban=g("set_iban"); s.sohnName=g("set_sohnName");
  s.rateOwn=parseFloat(g("set_rateOwn"))||0; s.rateHelper=parseFloat(g("set_rateHelper"))||0;
  s.invoicePrefix=g("set_invoicePrefix"); s.nextInvoiceNo=parseInt(g("set_nextInvoiceNo"),10)||1;
  save(); render(); toast("Einstellungen gespeichert");
}

/* ---------- Start ---------- */
try { render(); }
catch(err){ document.getElementById("app").innerHTML='<div style="padding:24px;font-family:sans-serif;color:#A5392C">Fehler: '+(err&&err.message?err.message:err)+'</div>'; }
</script>
</body>
